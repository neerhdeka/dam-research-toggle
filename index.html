<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAM Research Toggle</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #F9FAFB;
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #111827;
    }
    p {
      color: #6B7280;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
    }
    .links a {
      display: inline-block;
      background: #fff;
      border: 1.5px solid #E5E7EB;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      color: #0C6EFD;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }
    .links a:hover {
      background: #EFF6FF;
      border-color: #0C6EFD;
    }
  </style>
</head>
